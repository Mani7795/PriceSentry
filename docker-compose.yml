services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: pricesentry-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pricesentry}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pricesentry_dev}
      POSTGRES_DB: ${POSTGRES_DB:-pricesentry}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Phase 1 schema runs first (alphabetical order in this folder)
      - ./db/init.sql:/docker-entrypoint-initdb.d/00_init.sql:ro
      # Phase 2 schema (users, conversations, messages, citations) runs second
      - ./db/02_phase2_chat.sql:/docker-entrypoint-initdb.d/02_phase2_chat.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pricesentry}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: pricesentry-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  scraper:
    build:
      context: ./services/scraper
      dockerfile: Dockerfile
    container_name: pricesentry-scraper
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-pricesentry}:${POSTGRES_PASSWORD:-pricesentry_dev}@postgres:5432/${POSTGRES_DB:-pricesentry}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./services/scraper:/app
      - ./scripts:/app/scripts:ro
      - ./tests:/app/tests:ro
    command: ["sleep", "infinity"]

  worker:
    build:
      context: ./services/scraper
      dockerfile: Dockerfile
    container_name: pricesentry-worker
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-pricesentry}:${POSTGRES_PASSWORD:-pricesentry_dev}@postgres:5432/${POSTGRES_DB:-pricesentry}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/scraper:/app
      - ./scripts:/app/scripts:ro
    command: ["celery", "-A", "scraper.celery_app", "worker", "--loglevel=info", "--concurrency=2"]

  beat:
    build:
      context: ./services/scraper
      dockerfile: Dockerfile
    container_name: pricesentry-beat
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-pricesentry}:${POSTGRES_PASSWORD:-pricesentry_dev}@postgres:5432/${POSTGRES_DB:-pricesentry}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./services/scraper:/app
      - ./scripts:/app/scripts:ro
    command: ["celery", "-A", "scraper.celery_app", "beat", "--loglevel=info"]

  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    container_name: pricesentry-api
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-pricesentry}:${POSTGRES_PASSWORD:-pricesentry_dev}@postgres:5432/${POSTGRES_DB:-pricesentry}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./services/api:/app
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  web:
    build:
      context: ./services/web
      dockerfile: Dockerfile
    container_name: pricesentry-web
    environment:
      # In the browser, /api/v1/* is rewritten to the API by next.config.mjs
      NEXT_PUBLIC_API_URL: http://api:8000
      NODE_ENV: production
    depends_on:
      - api
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  pgdata:
