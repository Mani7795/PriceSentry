services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: pricesentry-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pricesentry}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pricesentry_dev}
      POSTGRES_DB: ${POSTGRES_DB:-pricesentry}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/00_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pricesentry}"]
      interval: 5s
      timeout: 3s
      retries: 10

  scraper:
    build:
      context: ./services/scraper
      dockerfile: Dockerfile
    container_name: pricesentry-scraper
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-pricesentry}:${POSTGRES_PASSWORD:-pricesentry_dev}@postgres:5432/${POSTGRES_DB:-pricesentry}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./services/scraper:/app
      - ./scripts:/app/scripts:ro
      - ./tests:/app/tests:ro
    # Stays running so we can `docker compose exec scraper ...`
    command: ["sleep", "infinity"]

  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    container_name: pricesentry-api
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-pricesentry}:${POSTGRES_PASSWORD:-pricesentry_dev}@postgres:5432/${POSTGRES_DB:-pricesentry}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./services/api:/app
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

volumes:
  pgdata:
